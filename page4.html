<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Your Gift</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="video-page">

  <!-- Tap to start (shown on iOS before anything) -->
  <div id="tap-start">
    <div id="tap-text">🎁 Tap to open your gift</div>
  </div>

  <!-- Countdown overlay (hidden until tap) -->
  <div id="countdown-overlay" style="display:none;">
    <div id="countdown-label">are u ready eleah? 🎁</div>
    <div id="countdown-number">5</div>
  </div>

  <!-- VIDEO -->
  <video 
    id="gift-video"
    src="assets/video.mp4"
    playsinline
    webkit-playsinline
    preload="auto"
    muted
  ></video>

  <script>
    const tapStart  = document.getElementById('tap-start');
    const overlay   = document.getElementById('countdown-overlay');
    const numEl     = document.getElementById('countdown-number');
    const video     = document.getElementById('gift-video');

    // Load video immediately so it buffers in background
    video.load();

    // Step 1: Wait for tap (needed for iOS to allow sound)
    tapStart.addEventListener('click', function() {
      tapStart.style.display = 'none';
      overlay.style.display  = 'flex';

      // Trigger play+pause inside the gesture so iOS grants audio permission
      video.muted = false;
      video.play().then(() => {
        video.pause();
        video.currentTime = 0;
      }).catch(() => {});

      startCountdown();
    });

    // Step 2: Countdown
    let count = 5;
    function startCountdown() {
      tick();
    }

    function tick() {
      numEl.style.animation = 'none';
      numEl.offsetHeight;
      numEl.style.animation = '';
      numEl.textContent = count;

      if (count === 0) {
        setTimeout(startVideo, 900);
        return;
      }
      count--;
      setTimeout(tick, 1000);
    }

    // Step 3: Play video
    function startVideo() {
      overlay.style.display = 'none';
      video.classList.add('visible');

      const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
      if (isMobile && screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }

      video.muted = false;
      video.currentTime = 0;
      video.play().catch(err => {
        console.log("Play failed:", err);
        // Last resort: play muted
        video.muted = true;
        video.play();
      });
    }
  </script>

</body>
</html>
